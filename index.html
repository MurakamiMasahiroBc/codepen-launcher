<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodePen Launcher</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a2e;
      --surface:   #16213e;
      --surface2:  #0f3460;
      --accent:    #e94560;
      --accent2:   #533483;
      --text:      #e0e0e0;
      --text-muted:#9e9e9e;
      --border:    #2a2a4a;
      --tab-active:#e94560;
      --radius:    8px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 800px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #fff; flex-shrink: 0;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: .02em;
    }
    header h1 span { color: var(--accent); }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 800px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── Mode Toggle ── */
    .mode-bar {
      display: flex;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .mode-btn {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: color .2s, border-bottom .2s;
      border-bottom: 3px solid transparent;
    }
    .mode-btn.active {
      color: var(--tab-active);
      border-bottom-color: var(--tab-active);
    }
    .mode-btn:hover:not(.active) { color: var(--text); }

    /* ── Panels ── */
    .panel { display: none; padding: 20px; }
    .panel.active { display: block; }

    /* ── Textarea shared ── */
    textarea {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: .82rem;
      line-height: 1.6;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: #4a4a6a; }

    /* ── Bulk panel ── */
    #bulk-textarea { min-height: 280px; }

    .helper-text {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .helper-text code {
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 3px;
      color: #a5d8ff;
      font-size: .75rem;
    }

    /* ── Individual panel — tabs ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .tab-btn {
      padding: 6px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      border-bottom: none;
      color: var(--text-muted);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .tab-btn.active {
      background: #0d0d1a;
      color: var(--tab-active);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    #html-ta { min-height: 180px; }
    #css-ta  { min-height: 180px; }
    #js-ta   { min-height: 180px; }

    /* ── Preview strip (bulk mode) ── */
    .preview-strip {
      display: none;
      margin-top: 14px;
      background: #0d0d1a;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      gap: 10px;
      flex-direction: column;
    }
    .preview-strip.visible { display: flex; }
    .preview-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-size: .78rem;
    }
    .preview-label {
      flex-shrink: 0;
      width: 42px;
      color: var(--accent);
      font-weight: 700;
      padding-top: 2px;
    }
    .preview-val {
      color: var(--text-muted);
      word-break: break-all;
      white-space: pre-wrap;
      max-height: 60px;
      overflow: hidden;
      line-height: 1.5;
    }

    /* ── Launch Button ── */
    .launch-wrap {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-launch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 28px;
      background: var(--accent);
      color: #fff;
      font-size: .92rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      text-decoration: none;
    }
    .btn-launch:hover { opacity: .88; }
    .btn-launch:active { transform: scale(.97); }
    .btn-launch svg { flex-shrink: 0; }

    .btn-clear {
      padding: 10px 18px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: .82rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-clear:hover { border-color: var(--text-muted); color: var(--text); }

    /* hidden form */
    #cp-form { display: none; }

    /* ── Footer ── */
    footer {
      margin-top: 28px;
      font-size: .72rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      body { padding: 16px 10px 32px; }
      header h1 { font-size: 1.05rem; }
      .mode-btn { font-size: .78rem; padding: 10px 4px; }
      .btn-launch { padding: 10px 20px; font-size: .85rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">CP</div>
  <h1>CodePen <span>Launcher</span></h1>
</header>

<div class="card">

  <!-- Mode Toggle -->
  <div class="mode-bar">
    <button class="mode-btn active" data-mode="bulk" onclick="switchMode('bulk')">📋 まとめて貼り付け</button>
    <button class="mode-btn"        data-mode="individual" onclick="switchMode('individual')">✏️ HTML / CSS / JS 個別</button>
  </div>

  <!-- ══ BULK PANEL ══ -->
  <div id="panel-bulk" class="panel active">
    <textarea
      id="bulk-textarea"
      placeholder="完全な HTML をここに貼り付け…
例)
<!DOCTYPE html>
<html>
<head>
  <style>body { background: #111; }</style>
</head>
<body>
  <h1>Hello</h1>
  <script>console.log('hi')<\/script>
</body>
</html>"
      oninput="parseBulk()"
    ></textarea>
    <p class="helper-text">
      <code>&lt;style&gt;</code>・<code>&lt;script&gt;</code>・それ以外の body を自動分離して CodePen に送信します
    </p>

    <!-- preview strip -->
    <div class="preview-strip" id="preview-strip">
      <div class="preview-row">
        <span class="preview-label">HTML</span>
        <span class="preview-val" id="prev-html">—</span>
      </div>
      <div class="preview-row">
        <span class="preview-label">CSS</span>
        <span class="preview-val" id="prev-css">—</span>
      </div>
      <div class="preview-row">
        <span class="preview-label">JS</span>
        <span class="preview-val" id="prev-js">—</span>
      </div>
    </div>
  </div>

  <!-- ══ INDIVIDUAL PANEL ══ -->
  <div id="panel-individual" class="panel">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="html" onclick="switchTab('html')">HTML</button>
      <button class="tab-btn"        data-tab="css"  onclick="switchTab('css')">CSS</button>
      <button class="tab-btn"        data-tab="js"   onclick="switchTab('js')">JavaScript</button>
    </div>
    <div id="tab-html" class="tab-pane active">
      <textarea id="html-ta" placeholder="<h1>Hello, CodePen!</h1>"></textarea>
    </div>
    <div id="tab-css" class="tab-pane">
      <textarea id="css-ta"  placeholder="body { background: #1a1a2e; color: #eee; }"></textarea>
    </div>
    <div id="tab-js" class="tab-pane">
      <textarea id="js-ta"   placeholder="console.log('Hello from JS');"></textarea>
    </div>
  </div>

  <!-- Launch Bar -->
  <div class="launch-wrap">
    <button class="btn-launch" onclick="launch()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      CodePen で開く
    </button>
    <button class="btn-clear" onclick="clearAll()">クリア</button>
  </div>
</div>

<!-- Hidden POST form → CodePen -->
<form id="cp-form" action="https://codepen.io/pen/define" method="POST" target="_blank">
  <input type="hidden" name="data" id="cp-data" />
</form>

<footer>Notion 埋め込み用 ・ POST → codepen.io/pen/define</footer>

<script>
  /* ── State ── */
  let mode = 'bulk';
  let parsed = { html: '', css: '', js: '' };

  /* ── Mode switch ── */
  function switchMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + m).classList.add('active');
  }

  /* ── Tab switch (individual mode) ── */
  function switchTab(t) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + t).classList.add('active');
  }

  /* ── Bulk parse ── */
  function parseBulk() {
    const raw = document.getElementById('bulk-textarea').value;

    // Extract CSS from <style>...</style>
    let css = '';
    const styleRe = /<style[^>]*>([\s\S]*?)<\/style>/gi;
    let m;
    while ((m = styleRe.exec(raw)) !== null) css += m[1] + '\n';

    // Extract JS from <script>...</script>
    let js = '';
    const scriptRe = /<script(?![^>]*src)[^>]*>([\s\S]*?)<\/script>/gi;
    while ((m = scriptRe.exec(raw)) !== null) js += m[1] + '\n';

    // Strip <style> and <script> blocks, then extract body content
    let stripped = raw
      .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
      .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '');

    // Try to grab inner body
    const bodyMatch = stripped.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
    let html = bodyMatch ? bodyMatch[1].trim() : stripped.trim();

    // If no body tag, remove doctype/html/head wrappers
    if (!bodyMatch) {
      html = html
        .replace(/<!DOCTYPE[^>]*>/gi, '')
        .replace(/<\/?html[^>]*>/gi, '')
        .replace(/<head[^>]*>[\s\S]*?<\/head>/gi, '')
        .replace(/<\/?body[^>]*>/gi, '')
        .trim();
    }

    parsed = { html: html.trim(), css: css.trim(), js: js.trim() };
    updatePreview();
  }

  function updatePreview() {
    const strip = document.getElementById('preview-strip');
    const hasContent = parsed.html || parsed.css || parsed.js;
    strip.classList.toggle('visible', hasContent);
    document.getElementById('prev-html').textContent = parsed.html ? trunc(parsed.html) : '—';
    document.getElementById('prev-css').textContent  = parsed.css  ? trunc(parsed.css)  : '—';
    document.getElementById('prev-js').textContent   = parsed.js   ? trunc(parsed.js)   : '—';
  }

  function trunc(s, n = 120) {
    s = s.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
    return s.length > n ? s.slice(0, n) + '…' : s;
  }

  /* ── Launch ── */
  function launch() {
    let payload;

    if (mode === 'bulk') {
      // Re-parse just in case
      parseBulk();
      payload = {
        html: parsed.html,
        css:  parsed.css,
        js:   parsed.js,
      };
    } else {
      payload = {
        html: document.getElementById('html-ta').value,
        css:  document.getElementById('css-ta').value,
        js:   document.getElementById('js-ta').value,
      };
    }

    if (!payload.html && !payload.css && !payload.js) {
      alert('コードを入力してください。');
      return;
    }

    document.getElementById('cp-data').value = JSON.stringify(payload);
    document.getElementById('cp-form').submit();
  }

  /* ── Clear ── */
  function clearAll() {
    document.getElementById('bulk-textarea').value = '';
    document.getElementById('html-ta').value = '';
    document.getElementById('css-ta').value  = '';
    document.getElementById('js-ta').value   = '';
    parsed = { html: '', css: '', js: '' };
    document.getElementById('preview-strip').classList.remove('visible');
  }
</script>
</body>
</html>
