<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodePen Launcher</title>
  <style>
    /* ── Design Tokens ── */
    :root {
      --sf-blue:      #096FCA;
      --lt-blue:      #76B7ED;
      --mg-gray:      #3A3E40;
      --lt-gray:      #96A0A6;
      --sunset:       #FF7669;
      --lt-pink:      #FFAAB3;
      --white:        #FFFFFF;
      --bg:           #F4F7FA;
      --surface:      #FFFFFF;
      --border:       #D6E4F0;
      --text:         #3A3E40;
      --text-muted:   #96A0A6;
      --radius:       10px;
      --radius-sm:    6px;
      --shadow:       0 2px 12px rgba(9,111,202,.08);
      --shadow-md:    0 4px 24px rgba(9,111,202,.13);
      --font:         'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 760px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      width: 44px; height: 44px; flex-shrink: 0;
      background: var(--sf-blue);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(9,111,202,.28);
    }
    .logo svg { display: block; }
    .header-text h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--mg-gray);
      letter-spacing: .01em;
      line-height: 1.2;
    }
    .header-text h1 span { color: var(--sf-blue); }
    .header-text p {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Mode Toggle ── */
    .mode-bar {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 6px;
      gap: 4px;
    }
    .mode-btn {
      flex: 1;
      padding: 9px 8px;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s, color .18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .mode-btn.active {
      background: var(--surface);
      color: var(--sf-blue);
      box-shadow: 0 1px 4px rgba(9,111,202,.12);
    }
    .mode-btn:hover:not(.active) { background: rgba(9,111,202,.06); color: var(--mg-gray); }

    /* ── Panel ── */
    .panel { display: none; padding: 20px 20px 0; }
    .panel.active { display: block; }

    /* ── Labels ── */
    .field-label {
      font-size: .75rem;
      font-weight: 700;
      color: var(--sf-blue);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    /* ── Textarea ── */
    textarea {
      width: 100%;
      background: #F8FBFE;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: .8rem;
      line-height: 1.65;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    textarea:focus {
      border-color: var(--sf-blue);
      box-shadow: 0 0 0 3px rgba(9,111,202,.1);
    }
    textarea::placeholder { color: #b8c8d8; }

    #bulk-textarea { min-height: 260px; }

    /* ── Helper ── */
    .helper-text {
      font-size: .73rem;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.6;
    }
    .helper-text code {
      background: #EBF4FF;
      color: var(--sf-blue);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: .72rem;
    }

    /* ── Preview Strip ── */
    .preview-strip {
      display: none;
      margin-top: 14px;
      background: #F0F7FF;
      border: 1px solid var(--lt-blue);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      flex-direction: column;
      gap: 8px;
    }
    .preview-strip.visible { display: flex; }
    .preview-row { display: flex; gap: 10px; align-items: flex-start; font-size: .75rem; }
    .preview-label {
      flex-shrink: 0;
      width: 36px;
      font-weight: 700;
      color: var(--sf-blue);
      padding-top: 1px;
    }
    .preview-val {
      color: var(--mg-gray);
      word-break: break-all;
      white-space: pre-wrap;
      max-height: 48px;
      overflow: hidden;
      line-height: 1.55;
      font-family: monospace;
    }
    .preview-empty { color: var(--text-muted); }

    /* ── Individual — Tab Bar ── */
    .tab-bar {
      display: flex;
      gap: 2px;
      margin-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    .tab-btn {
      padding: 7px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      color: var(--text-muted);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: color .18s, border-color .18s;
    }
    .tab-btn.active { color: var(--sf-blue); border-bottom-color: var(--sf-blue); }
    .tab-btn:hover:not(.active) { color: var(--mg-gray); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    #html-ta, #css-ta, #js-ta { min-height: 180px; }

    /* ── Launch Bar ── */
    .launch-wrap {
      padding: 16px 20px 20px;
      margin-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-launch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 26px;
      background: var(--sunset);
      color: #fff;
      font-size: .88rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: filter .18s, transform .1s, box-shadow .18s;
      box-shadow: 0 3px 12px rgba(255,118,105,.32);
      letter-spacing: .01em;
    }
    .btn-launch:hover {
      filter: brightness(1.06);
      box-shadow: 0 5px 18px rgba(255,118,105,.40);
    }
    .btn-launch:active { transform: scale(.97); }

    .btn-clear {
      padding: 10px 16px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .18s, color .18s;
    }
    .btn-clear:hover { border-color: var(--lt-gray); color: var(--mg-gray); }

    .spacer { flex: 1; }

    .badge {
      font-size: .68rem;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
    }

    /* Hidden form */
    #cp-form { display: none; }

    /* ── Footer ── */
    footer {
      margin-top: 20px;
      font-size: .7rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      body { padding: 20px 12px 36px; }
      .header-text h1 { font-size: 1.05rem; }
      .mode-btn { font-size: .75rem; }
      .btn-launch { padding: 10px 18px; font-size: .82rem; }
      .launch-wrap { flex-direction: column; align-items: stretch; }
      .btn-launch, .btn-clear { text-align: center; justify-content: center; }
      .spacer { display: none; }
      .badge { display: none; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 18 22 12 16 6"/>
      <polyline points="8 6 2 12 8 18"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>CodePen <span>Launcher</span></h1>
    <p>コードを貼り付けてワンクリックで開く</p>
  </div>
</header>

<div class="card">

  <!-- Mode Toggle -->
  <div class="mode-bar">
    <button class="mode-btn active" data-mode="bulk" onclick="switchMode('bulk')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      まとめて貼り付け
    </button>
    <button class="mode-btn" data-mode="individual" onclick="switchMode('individual')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      HTML / CSS / JS 個別
    </button>
  </div>

  <!-- ══ BULK PANEL ══ -->
  <div id="panel-bulk" class="panel active">
    <div class="field-label">完全な HTML を貼り付け</div>
    <textarea
      id="bulk-textarea"
      placeholder="<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #f0f4ff; }
  </style>
</head>
<body>
  <h1>Hello, CodePen!</h1>
  <script>console.log('hi')<\/script>
</body>
</html>"
      oninput="parseBulk()"
    ></textarea>
    <p class="helper-text">
      <code>&lt;style&gt;</code> → CSS ／ <code>&lt;script&gt;</code> → JS ／ それ以外の body → HTML に自動分離します
    </p>

    <div class="preview-strip" id="preview-strip">
      <div class="preview-row">
        <span class="preview-label">HTML</span>
        <span class="preview-val preview-empty" id="prev-html">—</span>
      </div>
      <div class="preview-row">
        <span class="preview-label">CSS</span>
        <span class="preview-val preview-empty" id="prev-css">—</span>
      </div>
      <div class="preview-row">
        <span class="preview-label">JS</span>
        <span class="preview-val preview-empty" id="prev-js">—</span>
      </div>
    </div>
  </div>

  <!-- ══ INDIVIDUAL PANEL ══ -->
  <div id="panel-individual" class="panel">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="html" onclick="switchTab('html')">HTML</button>
      <button class="tab-btn"        data-tab="css"  onclick="switchTab('css')">CSS</button>
      <button class="tab-btn"        data-tab="js"   onclick="switchTab('js')">JavaScript</button>
    </div>
    <div id="tab-html" class="tab-pane active">
      <textarea id="html-ta" placeholder="<h1>Hello, CodePen!</h1>"></textarea>
    </div>
    <div id="tab-css" class="tab-pane">
      <textarea id="css-ta" placeholder="body {&#10;  background: #f0f4ff;&#10;  font-family: system-ui, sans-serif;&#10;}"></textarea>
    </div>
    <div id="tab-js" class="tab-pane">
      <textarea id="js-ta" placeholder="console.log('Hello from JS');"></textarea>
    </div>
  </div>

  <!-- Launch Bar -->
  <div class="launch-wrap">
    <button class="btn-launch" onclick="launch()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      CodePen で開く
    </button>
    <button class="btn-clear" onclick="clearAll()">クリア</button>
    <span class="spacer"></span>
    <span class="badge">POST → codepen.io/pen/define</span>
  </div>
</div>

<!-- Hidden POST form -->
<form id="cp-form" action="https://codepen.io/pen/define" method="POST" target="_blank">
  <input type="hidden" name="data" id="cp-data" />
</form>

<footer>Notion 埋め込み用ツール</footer>

<script>
  let mode = 'bulk';
  let parsed = { html: '', css: '', js: '' };

  /* ── Mode ── */
  function switchMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + m).classList.add('active');
  }

  /* ── Tab ── */
  function switchTab(t) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + t).classList.add('active');
  }

  /* ── Bulk parse ── */
  function parseBulk() {
    const raw = document.getElementById('bulk-textarea').value;
    let css = '', js = '', m;

    const styleRe = /<style[^>]*>([\s\S]*?)<\/style>/gi;
    while ((m = styleRe.exec(raw)) !== null) css += m[1] + '\n';

    const scriptRe = /<script(?![^>]*\bsrc\b)[^>]*>([\s\S]*?)<\/script>/gi;
    while ((m = scriptRe.exec(raw)) !== null) js += m[1] + '\n';

    let stripped = raw
      .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
      .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '');

    const bodyMatch = stripped.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
    let html = bodyMatch ? bodyMatch[1].trim() : stripped
      .replace(/<!DOCTYPE[^>]*>/gi, '')
      .replace(/<\/?html[^>]*>/gi, '')
      .replace(/<head[^>]*>[\s\S]*?<\/head>/gi, '')
      .replace(/<\/?body[^>]*>/gi, '')
      .trim();

    parsed = { html: html.trim(), css: css.trim(), js: js.trim() };
    updatePreview();
  }

  function updatePreview() {
    const hasContent = parsed.html || parsed.css || parsed.js;
    document.getElementById('preview-strip').classList.toggle('visible', !!hasContent);

    ['html', 'css', 'js'].forEach(k => {
      const el = document.getElementById('prev-' + k);
      if (parsed[k]) {
        el.textContent = trunc(parsed[k]);
        el.classList.remove('preview-empty');
      } else {
        el.textContent = '—';
        el.classList.add('preview-empty');
      }
    });
  }

  function trunc(s, n = 110) {
    s = s.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
    return s.length > n ? s.slice(0, n) + '…' : s;
  }

  /* ── Launch ── */
  function launch() {
    let payload;
    if (mode === 'bulk') {
      parseBulk();
      payload = { html: parsed.html, css: parsed.css, js: parsed.js };
    } else {
      payload = {
        html: document.getElementById('html-ta').value,
        css:  document.getElementById('css-ta').value,
        js:   document.getElementById('js-ta').value,
      };
    }
    if (!payload.html && !payload.css && !payload.js) {
      alert('コードを入力してください。');
      return;
    }
    document.getElementById('cp-data').value = JSON.stringify(payload);
    document.getElementById('cp-form').submit();
  }

  /* ── Clear ── */
  function clearAll() {
    ['bulk-textarea', 'html-ta', 'css-ta', 'js-ta'].forEach(id => {
      document.getElementById(id).value = '';
    });
    parsed = { html: '', css: '', js: '' };
    document.getElementById('preview-strip').classList.remove('visible');
  }
</script>
</body>
</html>
